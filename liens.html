<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mélissa Carillo — Born to Shine</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">
<style>
:root{
  --terra:#A85540; --nude:#F5EDE4; --nude-deep:#EBD9CC; --cream:#FDFAF6;
  --dark:#1A110D; --mid:#7A5C4A; --white:#FFFFFF;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'DM Sans',sans-serif; font-weight:300; color:var(--dark);
  background:linear-gradient(180deg,var(--nude) 0%,var(--cream) 100%);
  min-height:100svh; display:flex; justify-content:center; padding:4rem 1.2rem 3rem;
}
.wrap{max-width:420px; width:100%; text-align:center}
.avatar{
  width:96px; height:96px; border-radius:50%; margin:0 auto 1.3rem;
  background:var(--nude-deep) center/cover no-repeat;
  background-image:url('melissa_portrait.jpg');
  box-shadow:0 8px 30px rgba(168,85,64,0.18); border:3px solid var(--white);
}
.brand{font-family:'Cormorant Garamond',serif; font-size:1.5rem; font-weight:500; letter-spacing:0.04em; margin-bottom:0.3rem}
.brand em{font-style:italic; color:var(--terra)}
.tagline{font-size:0.82rem; color:var(--mid); margin-bottom:2.2rem; line-height:1.6}
.links{display:flex; flex-direction:column; gap:0.9rem}
a.btn{
  display:flex; align-items:center; justify-content:center; gap:0.6rem;
  padding:1.05rem 1.3rem; text-decoration:none; border-radius:100px;
  font-size:0.85rem; font-weight:500; letter-spacing:0.01em;
  transition:transform .25s, box-shadow .25s;
}
a.btn:active{transform:scale(0.98)}
.btn-main{background:var(--terra); color:var(--white); box-shadow:0 8px 24px rgba(168,85,64,0.28)}
.btn-main:hover{box-shadow:0 10px 28px rgba(168,85,64,0.38)}
.btn-outline{background:var(--white); color:var(--dark); border:1px solid var(--nude-deep)}
.btn-outline:hover{border-color:var(--terra); color:var(--terra)}
.btn-ghost{background:transparent; color:var(--mid); font-size:0.78rem; padding:0.7rem}
.footer{margin-top:2.5rem; font-size:0.68rem; color:var(--mid); opacity:0.6}
</style>
</head>
<body>
<div class="wrap">
  <div class="avatar"></div>
  <div class="brand">Mélissa Carillo <em>· Born to Shine</em></div>
  <p class="tagline">Coach sport & mindset<br>Le cri de la liberté. Tu es née pour briller.</p>

  <div class="links">
    <a class="btn btn-main" href="https://payhip.com/b/myS5l" target="_blank">
      📖 Le livre — Ce que j'aurais aimé savoir sur le lipœdème
    </a>
    <a class="btn btn-outline" href="https://calendly.com/borntoshinelife/seance-decouverte-30-min" target="_blank">
      🗓️ Réserver ma séance découverte gratuite
    </a>
    <a class="btn btn-outline" href="https://borntoshineofficial.com" target="_blank">
      🌸 Découvrir Born to Shine
    </a>
    <a class="btn btn-outline" href="https://instagram.com/melissacarillo" target="_blank">
      📷 @melissacarillo
    </a>
    <a class="btn btn-outline" href="https://instagram.com/borntoshine.life" target="_blank">
      📷 @borntoshine.life
    </a>
  </div>

  <p class="footer">Born to Shine — Melissa Carillo</p>
</div>
</body>
</html>
